steps:
  # Build Docker image with build-time args
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}'
      - '--build-arg'
      - 'DATABASE_URL=${_DATABASE_URL}'
      - '--build-arg'
      - 'CLERK_SECRET_KEY=${_CLERK_SECRET_KEY}'
      - '-t'
      - '${_REPO}:${SHORT_SHA}'
      - '-t'
      - '${_REPO}:latest'
      - '.'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REPO}'

images:
  - '${_REPO}:${SHORT_SHA}'
  - '${_REPO}:latest'

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: scholarsync-web
  _REPO: asia-south1-docker.pkg.dev/metal-node-486118-t7/scholarsync/web
  _NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ''
  _DATABASE_URL: ''
  _CLERK_SECRET_KEY: ''

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint (zero tolerance)
        run: npx eslint --max-warnings 0

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold
        run: |
          npx vitest run --coverage --coverage.thresholds.lines=50 --coverage.thresholds.statements=50

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scholarsync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Enable pgvector extension
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d scholarsync_test -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Push database schema
        run: npx drizzle-kit push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/scholarsync_test

      - name: Seed database
        run: npx tsx src/lib/actions/seed.ts 2>/dev/null || echo "Seed skipped"
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/scholarsync_test
          NODE_ENV: development

      - name: Run Playwright tests
        run: npx playwright test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/scholarsync_test
          NODE_ENV: development
          BASE_URL: http://localhost:3000
          PORT: 3000

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Audit dependencies (critical only)
        run: npm audit --audit-level=critical

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets..."
          FOUND=0

          # Check for AWS keys
          if grep -rE 'AKIA[0-9A-Z]{16}' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' src/ ; then
            echo "::error::Found potential AWS access key"
            FOUND=1
          fi

          # Check for private keys
          if grep -rE 'BEGIN (RSA |EC |DSA )?PRIVATE KEY' --include='*.ts' --include='*.tsx' --include='*.js' src/ ; then
            echo "::error::Found potential private key"
            FOUND=1
          fi

          # Check for common API key patterns (sk_live, sk-ant-api, rk_live)
          if grep -rE '(sk_live_|sk-ant-api|rk_live_)[a-zA-Z0-9]{10,}' --include='*.ts' --include='*.tsx' --include='*.js' src/ ; then
            echo "::error::Found potential live API key"
            FOUND=1
          fi

          # Check for hardcoded JWTs
          if grep -rE 'eyJ[a-zA-Z0-9_-]{20,}\.[a-zA-Z0-9_-]{20,}\.[a-zA-Z0-9_-]{20,}' --include='*.ts' --include='*.tsx' --include='*.js' src/ ; then
            echo "::error::Found potential hardcoded JWT"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi

          echo "No hardcoded secrets found."

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://localhost:5432/scholarsync
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          NODE_ENV: production

      - name: Build Docker image
        run: docker build -t scholarsync:${{ github.sha }} .

  docker:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t scholarsync:${{ github.sha }} .
